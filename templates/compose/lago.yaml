# documentation: https://getlago.com/docs
# slogan: Open-source metered billing and usage-based pricing engine for SaaS and APIs.
# tags: billing,invoicing,usage-based,metered,saas,finance,open-source,lago,stripe-alternative
# category: automation
# logo: svgs/lago.svg
# port: 80
# author: @amirhmoradi
# repository: https://github.com/amirhmoradi/coolify-enhanced-templates

# SETUP NOTES:
# 1. REQUIRED — Generate and set LAGO_RSA_PRIVATE_KEY before first deployment:
#      openssl genrsa 2048 | base64 | tr -d '\n'
#    Paste the result as the LAGO_RSA_PRIVATE_KEY environment variable in Coolify.
#    This key signs JWT tokens. It CANNOT be changed after invoices are created.
#
# 2. Two service domains are created by Coolify:
#    - "front" (port 80)  → Lago web UI for your team (share this URL)
#    - "api"  (port 3000) → Lago REST/GraphQL API for integrations and SDKs
#
# 3. First login: visit the front URL and create your organization via the UI.
#    Or pre-provision an org by setting LAGO_CREATE_ORG=true and LAGO_ORG_* vars.
#
# 4. Email delivery: configure LAGO_SMTP_* to enable invoice and alert emails.
#
# 5. Enterprise license: set LAGO_LICENSE to unlock premium features.
#
# 6. Storage: defaults to local disk (lago-storage-data volume).
#    For production, enable S3-compatible storage with LAGO_USE_AWS_S3=true.

# ─── Shared environment block (YAML anchor) ───────────────────────────────────
x-backend-env: &backend-env
  # Database
  DATABASE_URL: postgresql://$SERVICE_USER_POSTGRES:$SERVICE_PASSWORD_POSTGRES@db:5432/lago?search_path=public
  # Redis (no password — internal network only)
  REDIS_URL: redis://redis:6379
  REDIS_PASSWORD: ""
  LAGO_REDIS_CACHE_URL: redis://redis:6379
  LAGO_REDIS_CACHE_PASSWORD: ""
  # Rails secret (auto-generated 64-byte hex)
  SECRET_KEY_BASE: $SERVICE_PASSWORD_64_SECRETKEYBASE
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  # RSA private key for JWT signing — REQUIRED, must be set by user before deploy
  LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY:?Run: openssl genrsa 2048 | base64 | tr -d '\n'}
  # Encryption keys (auto-generated — do not change after first deploy)
  LAGO_ENCRYPTION_PRIMARY_KEY: $SERVICE_PASSWORD_64_ENCPRIMARY
  LAGO_ENCRYPTION_DETERMINISTIC_KEY: $SERVICE_PASSWORD_64_ENCDET
  LAGO_ENCRYPTION_KEY_DERIVATION_SALT: $SERVICE_PASSWORD_64_ENCSALT
  # Public-facing URLs (auto-resolved from Coolify FQDN assignments)
  LAGO_API_URL: $SERVICE_URL_API
  LAGO_FRONT_URL: $SERVICE_URL_FRONT
  # Internal PDF service
  LAGO_PDF_URL: http://pdf:3000
  # Sidekiq web UI (accessible at /sidekiq on the API domain)
  LAGO_SIDEKIQ_WEB: "true"
  # Storage backend (local disk by default)
  LAGO_USE_AWS_S3: ${LAGO_USE_AWS_S3:-false}
  LAGO_AWS_S3_ACCESS_KEY_ID: ${LAGO_AWS_S3_ACCESS_KEY_ID:-}
  LAGO_AWS_S3_SECRET_ACCESS_KEY: ${LAGO_AWS_S3_SECRET_ACCESS_KEY:-}
  LAGO_AWS_S3_REGION: ${LAGO_AWS_S3_REGION:-us-east-1}
  LAGO_AWS_S3_BUCKET: ${LAGO_AWS_S3_BUCKET:-}
  LAGO_AWS_S3_ENDPOINT: ${LAGO_AWS_S3_ENDPOINT:-}
  LAGO_USE_GCS: ${LAGO_USE_GCS:-false}
  LAGO_GCS_PROJECT: ${LAGO_GCS_PROJECT:-}
  LAGO_GCS_BUCKET: ${LAGO_GCS_BUCKET:-}
  # SMTP (leave blank to skip email)
  LAGO_FROM_EMAIL: ${LAGO_FROM_EMAIL:-}
  LAGO_SMTP_ADDRESS: ${LAGO_SMTP_ADDRESS:-}
  LAGO_SMTP_PORT: ${LAGO_SMTP_PORT:-587}
  LAGO_SMTP_USERNAME: ${LAGO_SMTP_USERNAME:-}
  LAGO_SMTP_PASSWORD: ${LAGO_SMTP_PASSWORD:-}
  # Feature toggles
  LAGO_DISABLE_SIGNUP: ${LAGO_DISABLE_SIGNUP:-false}
  LAGO_DISABLE_PDF_GENERATION: ${LAGO_DISABLE_PDF_GENERATION:-false}
  LAGO_DISABLE_SEGMENT: "true"
  LAGO_DISABLE_WALLET_REFRESH: ${LAGO_DISABLE_WALLET_REFRESH:-false}
  LAGO_OAUTH_PROXY_URL: https://proxy.getlago.com
  # Enterprise license (optional)
  LAGO_LICENSE: ${LAGO_LICENSE:-}
  # Bootstrap organization on first startup (optional)
  LAGO_CREATE_ORG: ${LAGO_CREATE_ORG:-false}
  LAGO_ORG_NAME: ${LAGO_ORG_NAME:-}
  LAGO_ORG_USER_EMAIL: ${LAGO_ORG_USER_EMAIL:-}
  LAGO_ORG_USER_PASSWORD: ${LAGO_ORG_USER_PASSWORD:-}
  LAGO_ORG_API_KEY: ${LAGO_ORG_API_KEY:-}
  # Google OAuth (optional)
  GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID:-}
  GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET:-}

services:

  # ─── PostgreSQL (with pg_partman for event partitioning) ──────────────────────
  db:
    image: getlago/postgres-partman:15.0-alpine
    environment:
      POSTGRES_DB: lago
      POSTGRES_USER: $SERVICE_USER_POSTGRES
      POSTGRES_PASSWORD: $SERVICE_PASSWORD_POSTGRES
      PGDATA: /data/postgres
      POSTGRES_SCHEMA: public
    volumes:
      - lago-postgres-data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $SERVICE_USER_POSTGRES -d lago -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - lago-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Database Migrations (one-shot init container) ────────────────────────────
  migrate:
    image: getlago/api:v1.44.0
    command: ["./scripts/migrate.sh"]
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    exclude_from_hc: true

  # ─── Rails REST + GraphQL API ─────────────────────────────────────────────────
  # Exposed via its own Coolify domain (SERVICE_FQDN_API_3000).
  # Use this URL for Lago SDK integrations, webhooks, and API clients.
  api:
    image: getlago/api:v1.44.0
    command: ["./scripts/start.api.sh"]
    environment:
      <<: *backend-env
      # Registers a Coolify domain for this service on port 3000
      SERVICE_FQDN_API_3000: ""
    volumes:
      - lago-storage-data:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 15
      start_period: 60s

  # ─── Sidekiq Background Worker ────────────────────────────────────────────────
  api-worker:
    image: getlago/api:v1.44.0
    command: ["./scripts/start.worker.sh"]
    environment:
      <<: *backend-env
    volumes:
      - lago-storage-data:/app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 60s

  # ─── Clock / Cron Scheduler ───────────────────────────────────────────────────
  api-clock:
    image: getlago/api:v1.44.0
    command: ["./scripts/start.clock.sh"]
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s

  # ─── PDF Generator (Gotenberg / Chromium headless) ────────────────────────────
  pdf:
    image: getlago/lago-gotenberg:7.8.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Frontend (Vue.js SPA via nginx) ──────────────────────────────────────────
  # Primary user-facing URL. Share this domain with your team.
  front:
    image: getlago/front:v1.44.0
    environment:
      # Registers a Coolify domain for this service on port 80
      - SERVICE_FQDN_FRONT_80
      # API endpoint used by browser-side Vue.js (must be publicly reachable)
      - API_URL=$SERVICE_URL_API
      - APP_ENV=production
      - LAGO_OAUTH_PROXY_URL=https://proxy.getlago.com
      - LAGO_DISABLE_PDF_GENERATION=${LAGO_DISABLE_PDF_GENERATION:-false}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  lago-postgres-data:
  lago-redis-data:
  lago-storage-data:
